name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Existing tag to rebuild and publish (for example: v1.13.2)"
        required: false
        default: ""
      toolchain:
        description: "Rust toolchain version"
        required: false
        default: stable

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve Release Ref
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve target ref
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ref="${GITHUB_REF#refs/tags/}"
            tag="$ref"
          else
            ref="${{ github.event.inputs.release_ref }}"
            if [[ -z "$ref" ]]; then
              echo "::error::workflow_dispatch requires release_ref to be set to an existing tag such as v1.13.2"
              exit 1
            fi
            tag="${ref#refs/tags/}"
          fi

          if [[ ! "$tag" =~ ^v[0-9] ]]; then
            echo "::error::Release ref must resolve to a semver-style tag like v1.13.2"
            exit 1
          fi

          echo "release_ref=$ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build (Windows)
    needs: resolve
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.release_ref }}

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ github.event.inputs.toolchain || 'stable' }}
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets
        env:
          RUSTFLAGS: -D warnings

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          # WiX Toolset v3.14.1 - update URL if upgrading
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314.exe" -OutFile wix314.exe
          Start-Process -Wait -FilePath .\wix314.exe -ArgumentList '/install','/quiet','/norestart'

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build release (deny warnings)
        run: cargo build --release
        env:
          RUSTFLAGS: -D warnings

      - name: Build MSI installer
        run: cargo wix -p mdmdview --no-build

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/mdmdview.exe dist/mdmdview.exe
          Compress-Archive -Path dist/mdmdview.exe -DestinationPath "mdmdview-${{ needs.resolve.outputs.release_tag }}-windows-x86_64.zip"
          Copy-Item target/wix/*.msi "mdmdview-${{ needs.resolve.outputs.release_tag }}-windows-x86_64.msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdmdview-Windows
          path: |
            mdmdview-${{ needs.resolve.outputs.release_tag }}-windows-x86_64.zip
            mdmdview-${{ needs.resolve.outputs.release_tag }}-windows-x86_64.msi

  release:
    name: Publish Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: ${{ needs.resolve.outputs.release_tag }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.msi

  winget:
    name: Publish WinGet Manifest
    needs: [resolve, release]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    env:
      WINGET_PACKAGE_IDENTIFIER: ${{ vars.WINGET_PACKAGE_IDENTIFIER }}
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Check WinGet configuration
        id: winget-config
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_PACKAGE_IDENTIFIER)) {
            Write-Host "::notice::Skipping WinGet publish because repo variable WINGET_PACKAGE_IDENTIFIER is not set."
            exit 0
          }

          $token = $env:WINGET_CREATE_GITHUB_TOKEN
          if ([string]::IsNullOrWhiteSpace($token)) {
            $token = $env:WINGET_TOKEN
          }

          if ([string]::IsNullOrWhiteSpace($token)) {
            Write-Host "::notice::Skipping WinGet publish because neither WINGET_CREATE_GITHUB_TOKEN nor WINGET_TOKEN is set."
            exit 0
          }

          "winget_token=$token" >> $env:GITHUB_OUTPUT
          "enabled=true" >> $env:GITHUB_OUTPUT

      - name: Install WinGetCreate
        if: steps.winget-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit WinGet manifest update
        if: steps.winget-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $tag = "${{ needs.resolve.outputs.release_tag }}"
          $version = $tag -replace '^v', ''
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/mdmdview-$tag-windows-x86_64.msi"

          Write-Host "Updating WinGet package $env:WINGET_PACKAGE_IDENTIFIER"
          Write-Host "Version: $version"
          Write-Host "Installer URL: $installerUrl"

          # Generate manifests locally (don't submit yet)
          .\wingetcreate.exe update $env:WINGET_PACKAGE_IDENTIFIER `
            --version $version `
            --urls $installerUrl `
            --out manifests

          # Ensure ElevationRequirement is present (perMachine MSI needs elevation)
          $installerManifest = Get-ChildItem -Path manifests -Recurse -Filter '*.installer.yaml' | Select-Object -First 1
          $content = Get-Content $installerManifest.FullName -Raw
          if ($content -notmatch 'ElevationRequirement') {
            Write-Host "Adding ElevationRequirement: elevationRequired"
            $content = $content -replace '(InstallModes:)', "ElevationRequirement: elevationRequired`n`$1"
            Set-Content $installerManifest.FullName -Value $content -NoNewline
          }

          # Submit the patched manifests
          .\wingetcreate.exe submit manifests `
            --token "${{ steps.winget-config.outputs.winget_token }}"
