name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      toolchain:
        description: "Rust toolchain version"
        required: false
        default: stable

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ github.event.inputs.toolchain || 'stable' }}
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets
        env:
          RUSTFLAGS: -D warnings

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          # WiX Toolset v3.14.1 - update URL if upgrading
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314.exe" -OutFile wix314.exe
          Start-Process -Wait -FilePath .\wix314.exe -ArgumentList '/install','/quiet','/norestart'

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build release (deny warnings)
        run: cargo build --release
        env:
          RUSTFLAGS: -D warnings

      - name: Build MSI installer
        run: cargo wix -p mdmdview --no-build

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/mdmdview.exe dist/mdmdview.exe
          Compress-Archive -Path dist/mdmdview.exe -DestinationPath "mdmdview-${{ github.ref_name }}-windows-x86_64.zip"
          Copy-Item target/wix/*.msi "mdmdview-${{ github.ref_name }}-windows-x86_64.msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdmdview-Windows
          path: |
            mdmdview-${{ github.ref_name }}-windows-x86_64.zip
            mdmdview-${{ github.ref_name }}-windows-x86_64.msi

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.msi

  winget:
    name: Publish WinGet Manifest
    needs: release
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      WINGET_PACKAGE_IDENTIFIER: ${{ vars.WINGET_PACKAGE_IDENTIFIER }}
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
    steps:
      - name: Check WinGet configuration
        id: winget-config
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_PACKAGE_IDENTIFIER)) {
            Write-Host "::notice::Skipping WinGet publish because repo variable WINGET_PACKAGE_IDENTIFIER is not set."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)) {
            Write-Host "::notice::Skipping WinGet publish because secret WINGET_CREATE_GITHUB_TOKEN is not set."
            exit 0
          }

          "enabled=true" >> $env:GITHUB_OUTPUT

      - name: Install WinGetCreate
        if: steps.winget-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe --version

      - name: Submit WinGet manifest update
        if: steps.winget-config.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/mdmdview-$tag-windows-x86_64.msi"

          Write-Host "Updating WinGet package $env:WINGET_PACKAGE_IDENTIFIER"
          Write-Host "Version: $version"
          Write-Host "Installer URL: $installerUrl"

          .\wingetcreate.exe update $env:WINGET_PACKAGE_IDENTIFIER `
            --version $version `
            --urls $installerUrl `
            --token $env:WINGET_CREATE_GITHUB_TOKEN `
            --submit
